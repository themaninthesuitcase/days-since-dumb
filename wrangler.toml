# Replace the id and preview_id after running:
#   npx wrangler kv namespace create COUNTER_KV
#   npx wrangler kv namespace create COUNTER_KV --preview

name = "days-since-dumb"
compatibility_date = "2024-11-01"
pages_build_output_dir = "dist"

[[kv_namespaces]]
binding = "COUNTER_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_KV_NAMESPACE_PREVIEW_ID"
